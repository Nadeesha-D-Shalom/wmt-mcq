<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Web Technology Quiz</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 40px
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08)
        }

        h1 {
            text-align: center
        }

        .question {
            margin-top: 30px;
            padding: 15px;
            border: 1px solid #e3e3e3;
            border-radius: 6px
        }

        .options label {
            display: block;
            margin: 6px 0;
            cursor: pointer
        }

        button {
            margin-top: 30px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            background: #2b7cff;
            color: white;
            border-radius: 6px;
            cursor: pointer
        }

        .correct {
            background: #d4edda
        }

        .wrong {
            background: #f8d7da
        }

        .missed {
            background: #fff3cd
        }

        .result {
            font-weight: bold;
            margin-top: 20px;
            font-size: 18px
        }

        code {
            background: #f1f1f1;
            padding: 3px 6px;
            border-radius: 4px
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Advanced WMT Midterm Quiz</h1>
        <p>Select the correct answer(s).</p>

        <form id="quizForm"></form>

        <button onclick="submitQuiz()" type="button">Submit Answers</button>

        <div id="result" class="result"></div>

    </div>

    <script>

        const questions = [

            {
                type: "checkbox",
                q: "1. Full Web Request Hierarchy — Which steps occur before the browser renders a page?",
                options: [
                    "Browser resolves domain using DNS",
                    "Browser establishes TCP connection",
                    "Browser sends HTTP request",
                    "Server processes request",
                    "Browser constructs DOM tree"
                ],
                correct: [0, 1, 2, 3, 4]
            },

            {
                type: "radio",
                q: "2. Which HTML tag is used to link an external CSS file?",
                options: [
                    "<script src='style.css'>",
                    "<link rel='stylesheet' href='style.css'>",
                    "<style src='style.css'>",
                    "<css href='style.css'>"
                ],
                correct: [1]
            },

            {
                type: "checkbox",
                q: "3. Which components may participate in DNS resolution hierarchy?",
                options: [
                    "Browser cache",
                    "Local DNS resolver",
                    "Root DNS server",
                    "TLD DNS server",
                    "Authoritative DNS server"
                ],
                correct: [0, 1, 2, 3, 4]
            },

            {
                type: "radio",
                q: "4. Which selector has the highest CSS specificity?",
                options: [
                    "Element selector",
                    "Class selector",
                    "ID selector",
                    "Universal selector"
                ],
                correct: [2]
            },

            {
                type: "checkbox",
                q: "5. Which are valid JavaScript output methods?",
                options: [
                    "alert()",
                    "document.write()",
                    "console.log()",
                    "innerHTML",
                    "print()"
                ],
                correct: [0, 1, 2, 3]
            },

            {
                type: "radio",
                q: "6. What does querySelectorAll() return?",
                options: [
                    "Array",
                    "HTMLCollection",
                    "NodeList",
                    "Element"
                ],
                correct: [2]
            },

            {
                type: "checkbox",
                q: "7. Which statements about NodeList are correct?",
                options: [
                    "Returned by querySelectorAll",
                    "Supports forEach",
                    "Always live collection",
                    "Can be converted to Array",
                    "Stores DOM nodes"
                ],
                correct: [0, 1, 3, 4]
            },

            {
                type: "radio",
                q: "8. Which event occurs when the mouse pointer enters an element?",
                options: [
                    "onClick",
                    "onMouseOver",
                    "onSubmit",
                    "onLoad"
                ],
                correct: [1]
            },

            {
                type: "checkbox",
                q: "9. Which are valid JavaScript popup boxes?",
                options: [
                    "alert",
                    "confirm",
                    "prompt",
                    "messageBox",
                    "textBox"
                ],
                correct: [0, 1, 2]
            },

            {
                type: "radio",
                q: "10. Which property is used to change text inside an element?",
                options: [
                    "innerHTML",
                    "outerHTML",
                    "nodeValue",
                    "tagName"
                ],
                correct: [0]
            }

        ];

        const form = document.getElementById("quizForm");

        questions.forEach((q, i) => {

            let div = document.createElement("div");
            div.className = "question";

            let title = document.createElement("h3");
            title.innerText = q.q;
            div.appendChild(title);

            let optDiv = document.createElement("div");
            optDiv.className = "options";

            q.options.forEach((opt, j) => {

                let label = document.createElement("label");

                let input = document.createElement("input");

                input.type = q.type === "radio" ? "radio" : "checkbox";

                input.name = "q" + i;
                input.value = j;

                label.appendChild(input);
                label.append(" " + opt);

                optDiv.appendChild(label);

            });

            div.appendChild(optDiv);
            form.appendChild(div);

        });

        function submitQuiz() {

            let score = 0;

            questions.forEach((q, i) => {

                let selected = [...document.querySelectorAll("input[name='q" + i + "']:checked")].map(e => parseInt(e.value));

                let correct = q.correct;

                let questionDiv = document.getElementsByClassName("question")[i];

                questionDiv.classList.remove("correct", "wrong", "missed");

                let correctSet = new Set(correct);
                let selectedSet = new Set(selected);

                let isCorrect = true;

                if (correct.length !== selected.length) isCorrect = false;

                correct.forEach(v => {
                    if (!selectedSet.has(v)) isCorrect = false;
                });

                if (selected.length === 0) {

                    questionDiv.classList.add("missed");

                }

                else if (isCorrect) {

                    questionDiv.classList.add("correct");
                    score++;

                }

                else {

                    questionDiv.classList.add("wrong");

                }

            });

            document.getElementById("result").innerText = "Score: " + score + " / " + questions.length;

        }

    </script>

</body>

</html>
