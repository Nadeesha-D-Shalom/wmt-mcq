<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMT MCQ Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

.container{
text-align:center;
background:rgba(255,255,255,0.08);
padding:50px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h1{
font-size:36px;
margin-bottom:15px;
}

p{
opacity:0.8;
margin-bottom:35px;
}

.button-grid{
display:grid;
grid-template-columns:repeat(2,200px);
gap:20px;
justify-content:center;
}

.button-grid a{
text-decoration:none;
}

.wmt-btn{
display:block;
padding:18px;
border-radius:10px;
font-size:18px;
font-weight:600;
color:white;
background:linear-gradient(135deg,#00c6ff,#0072ff);
transition:all 0.3s ease;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.wmt-btn:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 15px 30px rgba(0,0,0,0.4);
background:linear-gradient(135deg,#43e97b,#38f9d7);
}

.footer{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>WMT MCQ Portal</h1>
<p>Select the quiz set you want to practice</p>

<div class="button-grid">

<a href="wmt1.html">
<div class="wmt-btn">WMT 1</div>
</a>

<a href="wmt2.html">
<div class="wmt-btn">WMT 2</div>
</a>

<a href="wmt3.html">
<div class="wmt-btn">WMT 3</div>
</a>

<a href="wmt4.html">
<div class="wmt-btn">WMT 4</div>
</a>

<a href="wmt5.html">
<div class="wmt-btn">WMT 5</div>
</a>

</div>

<div class="footer">
Web & Mobile Technology MCQ Practice <br> This Answers can make mistakes please double check
</div>

</div>

</body>
</html>
