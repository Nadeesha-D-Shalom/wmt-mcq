<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;

    .container {
      max-width: 1100px;

      padding: 24px;
    }
    .header, .card, .result-box {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .header {
      padding: 24px;
      margin-bottom: 24px;
    }
    h1, h2, h3, p { margin-top: 0; }
    .muted { color: #94a3b8; }
    .question-card {
      padding: 20px;
      margin-bottom: 18px;
    }
    .question-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #f8fafc;
    }
    .question-text {
      margin-bottom: 14px;
      color: #cbd5e1;
    }
    .options {
      display: grid;
      gap: 10px;
    }
    label.option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      cursor: pointer;
    }
    label.option:hover {
      background: #243247;
    }
    input[type="checkbox"] {
      margin-top: 3px;
      transform: scale(1.1);
    }
    .actions {
      position: sticky;
      bottom: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
      padding: 16px 0 8px;
      margin-top: 10px;
    }
    .actions-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: #22c55e;
      color: #052e16;
    }
    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    .result-box {
      padding: 20px;
      margin: 24px 0;
      display: none;
    }
    .score {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #86efac;
    }
    .feedback {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }
    .correct {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.4);
    }
    .wrong {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.4);
    }
    .missed {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.4);
    }
    .answer-key {
      margin-top: 8px;
      color: #fde68a;
      font-weight: 700;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .summary-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
    }
    .summary-item strong {
      display: block;
      font-size: 18px;
      color: #f8fafc;
    }
    @media (max-width: 640px) {
      .container { padding: 16px; }
      .question-card { padding: 16px; }
    }
  </style>
</head>

    const form = document.getElementById('quizForm');
    const resultBox = document.getElementById('resultBox');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderQuiz() {
      form.innerHTML = questions.map((q) => {
        const optionsHtml = Object.entries(q.options).map(([key, value]) => `
          <label class="option">
            <input type="checkbox" name="q${q.number}" value="${key}">
            <span><strong>${key}.</strong> ${escapeHtml(value)}</span>
          </label>
        `).join('');

        return `
          <div class="card question-card" id="question-${q.number}">
            <div class="question-title">Question ${q.number}</div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="options">${optionsHtml}</div>
            <div class="feedback" id="feedback-${q.number}" style="display:none;"></div>
          </div>
        `;
      }).join('');
    }

    function arraysEqualAsSets(arr1, arr2) {
      const a = [...arr1].sort();
      const b = [...arr2].sort();
      return a.length === b.length && a.every((value, index) => value === b[index]);
    }

    function submitQuiz() {
      let correctCount = 0;
      let incorrectCount = 0;

      questions.forEach((q) => {
        const selected = [...document.querySelectorAll(`input[name="q${q.number}"]:checked`)].map((input) => input.value);
        const isCorrect = arraysEqualAsSets(selected, q.correct);
        const feedback = document.getElementById(`feedback-${q.number}`);

        feedback.style.display = 'block';

        if (isCorrect) {
          correctCount++;
          feedback.className = 'feedback correct';
          feedback.innerHTML = `Correct. <div class="answer-key">Answer: ${q.correct.join(', ')}</div>`;
        } else {
          incorrectCount++;
          feedback.className = 'feedback wrong';
          feedback.innerHTML = `Incorrect. <div class="answer-key">Correct answer(s): ${q.correct.join(', ')}</div>`;
        }
      });

      const percentage = ((correctCount / questions.length) * 100).toFixed(2);
      resultBox.style.display = 'block';
      resultBox.innerHTML = `
        <div class="score">Score: ${correctCount} / ${questions.length} (${percentage}%)</div>
        <div class="summary-grid">
          <div class="summary-item"><span>Total Questions</span><strong>${questions.length}</strong></div>
          <div class="summary-item"><span>Correct</span><strong>${correctCount}</strong></div>
          <div class="summary-item"><span>Incorrect</span><strong>${incorrectCount}</strong></div>
          <div class="summary-item"><span>Result</span><strong>${percentage}%</strong></div>
        </div>
      `;

      resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetQuiz() {
      document.querySelectorAll('input[type="checkbox"]').forEach((input) => input.checked = false);
      document.querySelectorAll('.feedback').forEach((box) => {
        box.style.display = 'none';
        box.innerHTML = '';
        box.className = 'feedback';
      });
      resultBox.style.display = 'none';
      resultBox.innerHTML = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuiz();
  </script>
</body>
</html>
